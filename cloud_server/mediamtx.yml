###############################################
# Global settings

# Enable APIs for monitoring
api: yes
apiAddress: :8001

###############################################
# HLS settings
hls: yes
hlsAlwaysRemux: no
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

###############################################
# Path settings
paths:
  all:
    # Allow local agent to push streams without auth for now.
    # In production, this should be secured.
    publishUser: ""
    publishPass: ""
